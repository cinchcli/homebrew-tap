name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  brew-style:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Style check
        # FormulaAudit/Conflicts cop crashes on Formula/cinch.rb (Homebrew/brew
        # rubocop bundle bug, reports "no offenses" but exits 1). Exclude it.
        run: brew style --except-cops FormulaAudit/Conflicts Formula/*.rb Casks/*.rb

  # Audit runs against any non-placeholder SHA cask/formula.
  # Until the first desktop release replaces the placeholder hashes,
  # cinch-desktop is intentionally skipped (audit would fail on bogus SHA).
  brew-audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap local checkout
        run: brew tap --custom-remote cinchcli/tap "$PWD"

      - name: Audit casks (skip those with placeholder SHA)
        run: |
          shopt -s nullglob
          for f in Casks/*.rb; do
            if grep -q "REPLACE_.*_SHA" "$f"; then
              echo "Skipping $f (placeholder SHA)"
              continue
            fi
            name="$(basename "$f" .rb)"
            brew audit --cask "cinchcli/tap/$name"
          done

      - name: Audit formulas
        run: |
          shopt -s nullglob
          for f in Formula/*.rb; do
            name="$(basename "$f" .rb)"
            brew audit --formula "cinchcli/tap/$name"
          done
